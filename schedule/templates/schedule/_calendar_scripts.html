<script>
  (function($) {
    function setupMonthJump() {
      var $jump = $("#clrc-month-jump");

      if (!$jump.length) {
        return;
      }

      var baseUrl = $jump.data("calendar-url");

      $jump.on("change", function() {
        var parts = this.value.split("-");
        if (parts.length !== 2) {
          return;
        }
        window.location.href = baseUrl + "?year=" + parts[0] + "&month=" + parts[1];
      });
    }

    $(setupMonthJump);

    window.openDetail = function(node) {
      var selector = $(node).attr("href");
      var $detail = $(selector);

      if (!$detail.length) {
        return false;
      }

      if ($detail.hasClass("ui-dialog-content")) {
        $detail.dialog("destroy");
      }

      $detail.dialog({
        buttons: {},
        dialogClass: "clrc-detail-dialog",
        maxHeight: Math.max(320, $(window).height() - 110),
        modal: true,
        position: { my: "center center", at: "center center", of: window, collision: "fit" },
        title: "Details",
        width: Math.min(620, Math.max(320, $(window).width() - 28))
      });

      $detail.dialog("open");
      return false;
    };
  })(jQuery);
</script>

<script>
  (function($) {
    function setupMonthJump() {
      var $jump = $("#clrc-month-jump");

      if (!$jump.length) {
        return;
      }

      var baseUrl = $jump.data("calendar-url");

      $jump.on("change", function() {
        var parts = this.value.split("-");
        if (parts.length !== 2) {
          return;
        }
        window.location.href = baseUrl + "?year=" + parts[0] + "&month=" + parts[1];
      });
    }

    function closeDetail() {
      $(".clrc-detail-overlay").removeClass("is-open").attr("aria-hidden", "true");
      $("body").removeClass("clrc-detail-open");
    }

    function ensureDetailShell() {
      var $shell = $(".clrc-detail-overlay");

      if ($shell.length) {
        return $shell;
      }

      return $(
        '<div class="clrc-detail-overlay" aria-hidden="true">' +
          '<div class="clrc-detail-modal" role="dialog" aria-modal="true" aria-labelledby="clrc-detail-title">' +
            '<div class="clrc-detail-modal-titlebar">' +
              '<h2 id="clrc-detail-title">Details</h2>' +
              '<button type="button" class="clrc-detail-close" aria-label="Close details">x</button>' +
            '</div>' +
            '<div class="clrc-detail-modal-body"></div>' +
          '</div>' +
        '</div>'
      ).appendTo("body");
    }

    window.openDetail = function(node) {
      var selector = $(node).attr("href");
      var detailNode = null;
      var $detail;
      var $shell;

      if (selector && selector.charAt(0) === "#") {
        detailNode = document.getElementById(selector.slice(1));
      }

      $detail = detailNode ? $(detailNode) : $(selector);

      if (!$detail.length) {
        return false;
      }

      $shell = ensureDetailShell();
      $shell.find(".clrc-detail-modal-body").html($detail.html());
      $shell.addClass("is-open").attr("aria-hidden", "false");
      $("body").addClass("clrc-detail-open");
      $shell.find(".clrc-detail-close").focus();

      return false;
    };

    function setupEventDetails() {
      $(document)
        .off("click.clrcDetails", ".clrc-calendar-page .fc .event-time[href^='#']")
        .on("click.clrcDetails", ".clrc-calendar-page .fc .event-time[href^='#']", function(event) {
          event.preventDefault();
          event.stopPropagation();
          return window.openDetail(this);
        })
        .off("click.clrcDetailsClose", ".clrc-detail-close, .clrc-detail-overlay")
        .on("click.clrcDetailsClose", ".clrc-detail-close, .clrc-detail-overlay", function(event) {
          if ($(event.target).closest(".clrc-detail-modal").length && !$(event.target).is(".clrc-detail-close")) {
            return;
          }
          event.preventDefault();
          closeDetail();
        })
        .off("keyup.clrcDetailsClose")
        .on("keyup.clrcDetailsClose", function(event) {
          if (event.key === "Escape" || event.keyCode === 27) {
            closeDetail();
          }
        });
    }

    $(function() {
      setupMonthJump();
      setupEventDetails();
    });
  })(jQuery);
</script>

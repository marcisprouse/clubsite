<script>
  (function($) {
    function setupMonthJump() {
      var $jump = $("#clrc-month-jump");

      if (!$jump.length) {
        return;
      }

      var baseUrl = $jump.data("calendar-url");

      $jump.on("change", function() {
        var parts = this.value.split("-");
        if (parts.length !== 2) {
          return;
        }
        window.location.href = baseUrl + "?year=" + parts[0] + "&month=" + parts[1];
      });
    }

    function placeDetailDialog($detail) {
      var $dialog = $detail.dialog("widget");
      var gutter = 14;
      var maxHeight = Math.max(240, $(window).height() - (gutter * 2));
      var top;
      var left;

      $detail.dialog("option", "maxHeight", maxHeight);

      top = Math.max(gutter, ($(window).height() - $dialog.outerHeight()) / 2);
      left = Math.max(gutter, ($(window).width() - $dialog.outerWidth()) / 2);

      $dialog.css({
        left: left + "px",
        position: "fixed",
        top: top + "px"
      });
    }

    window.openDetail = function(node) {
      var selector = $(node).attr("href");
      var detailNode = null;
      var $detail;

      if (selector && selector.charAt(0) === "#") {
        detailNode = document.getElementById(selector.slice(1));
      }

      $detail = detailNode ? $(detailNode) : $(selector);

      if (!$detail.length) {
        return false;
      }

      if ($detail.hasClass("ui-dialog-content")) {
        $detail.dialog("destroy");
      }

      $detail.dialog({
        buttons: {},
        closeText: "x",
        close: function() {
          $(window).off("resize.clrcDetailDialog");
        },
        dialogClass: "clrc-detail-dialog",
        maxHeight: Math.max(240, $(window).height() - 110),
        modal: false,
        position: {
          my: "center",
          at: "center",
          of: window
        },
        title: "Details",
        width: Math.min(620, Math.max(320, $(window).width() - 28))
      });

      $detail.dialog("open");
      placeDetailDialog($detail);

      $(window)
        .off("resize.clrcDetailDialog")
        .on("resize.clrcDetailDialog", function() {
          if ($detail.hasClass("ui-dialog-content") && $detail.dialog("isOpen")) {
            placeDetailDialog($detail);
          }
        });

      return false;
    };

    function setupEventDetails() {
      $(document)
        .off("click.clrcDetails", ".clrc-calendar-page .fc .event-time[href^='#']")
        .on("click.clrcDetails", ".clrc-calendar-page .fc .event-time[href^='#']", function(event) {
          event.preventDefault();
          event.stopPropagation();
          return window.openDetail(this);
        });
    }

    $(function() {
      setupMonthJump();
      setupEventDetails();
    });
  })(jQuery);
</script>

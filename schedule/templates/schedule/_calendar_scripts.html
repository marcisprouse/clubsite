<script>
  (function($) {
    function setupMonthJump() {
      var $jump = $("#clrc-month-jump");

      if (!$jump.length) {
        return;
      }

      var baseUrl = $jump.data("calendar-url");

      $jump.on("change", function() {
        var parts = this.value.split("-");
        if (parts.length !== 2) {
          return;
        }
        window.location.href = baseUrl + "?year=" + parts[0] + "&month=" + parts[1];
      });
    }

    window.openDetail = function(node) {
      var selector = $(node).attr("href");
      var detailNode = null;
      var $detail;

      if (selector && selector.charAt(0) === "#") {
        detailNode = document.getElementById(selector.slice(1));
      }

      $detail = detailNode ? $(detailNode) : $(selector);

      if (!$detail.length) {
        return false;
      }

      if ($detail.hasClass("ui-dialog-content")) {
        $detail.dialog("destroy");
      }

      $detail.dialog({
        buttons: {},
        closeText: "x",
        dialogClass: "clrc-detail-dialog",
        maxHeight: Math.max(320, $(window).height() - 110),
        modal: false,
        position: {
          my: "left top",
          at: "left+24 top+24",
          of: window
        },
        title: "Details",
        width: Math.min(620, Math.max(320, $(window).width() - 28))
      });

      $detail.dialog("open");
      return false;
    };

    function setupEventDetails() {
      $(document)
        .off("click.clrcDetails", ".clrc-calendar-page .fc .event-time[href^='#']")
        .on("click.clrcDetails", ".clrc-calendar-page .fc .event-time[href^='#']", function(event) {
          event.preventDefault();
          event.stopPropagation();
          return window.openDetail(this);
        });
    }

    $(function() {
      setupMonthJump();
      setupEventDetails();
    });
  })(jQuery);
</script>

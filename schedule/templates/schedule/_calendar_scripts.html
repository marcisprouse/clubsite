<script>
  (function($) {
    function setupMonthJump() {
      var $jump = $("#clrc-month-jump");

      if (!$jump.length) {
        return;
      }

      var baseUrl = $jump.data("calendar-url");
      var activeYear = parseInt($jump.data("year"), 10);
      var activeMonth = parseInt($jump.data("month"), 10);
      var formatter = new Intl.DateTimeFormat("en-US", { month: "long", year: "numeric" });

      $jump.empty();

      for (var offset = -12; offset <= 12; offset += 1) {
        var date = new Date(activeYear, activeMonth - 1 + offset, 1, 12);
        var year = date.getFullYear();
        var month = date.getMonth() + 1;
        var value = year + "-" + month;
        var option = new Option(formatter.format(date), value, offset === 0, offset === 0);

        $jump.append(option);
      }

      $jump.on("change", function() {
        var parts = this.value.split("-");
        window.location.href = baseUrl + "?year=" + parts[0] + "&month=" + parts[1];
      });
    }

    $(setupMonthJump);

    window.openDetail = function(node) {
      var selector = $(node).attr("href");
      var $detail = $(selector);

      if (!$detail.length) {
        return false;
      }

      if ($detail.hasClass("ui-dialog-content")) {
        $detail.dialog("destroy");
      }

      $detail.dialog({
        buttons: {},
        dialogClass: "clrc-detail-dialog",
        maxHeight: Math.max(320, $(window).height() - 110),
        modal: true,
        position: { my: "center top", at: "center top+72", of: window },
        title: "Details",
        width: Math.min(620, Math.max(320, $(window).width() - 28))
      });

      $detail.dialog("open");
      return false;
    };
  })(jQuery);
</script>

<div class="clrc-calendar-view-picker clrc-screen-print-hidden">
  <label for="clrc-calendar-view-{{ active_view }}">Calendar view</label>
  <select id="clrc-calendar-view-{{ active_view }}" onchange="if (this.value) { window.location.href = this.value; }">
    <option value="{% url "day_calendar" calendar.slug %}"{% if active_view == 'day' %} selected{% endif %}>Today</option>
    <option value="{% url "week_calendar" calendar.slug %}"{% if active_view == 'week' %} selected{% endif %}>This Week</option>
    <option value="{% url "month_calendar" calendar.slug %}"{% if active_view == 'month' %} selected{% endif %}>This Month</option>
    <option value="{% url "tri_month_calendar" calendar.slug %}"{% if active_view == 'tri_month' %} selected{% endif %}>3 Months</option>
    <option value="{% url "year_calendar" calendar.slug %}"{% if active_view == 'year' %} selected{% endif %}>This Year</option>
  </select>
</div>
